<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>D-T-AI Outputs Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

header {
  padding:20px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-size:20px;
  font-weight:bold;
  color:#7c3aed;
}

.container {
  display:grid;
  grid-template-columns: 1fr 2fr;
  gap:20px;
  padding:20px;
}

.panel {
  background:#111827;
  padding:15px;
  border-radius:10px;
}

.file {
  padding:8px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.file:hover {
  background:#1f2937;
}

pre {
  white-space: pre-wrap;
}
input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🚀 D-T-AI CONTROL PANEL</div>
  <div>Live GitHub Dashboard</div>
</header>

<div class="container">

  <div class="panel">
    <h3>🔍 Search Repo</h3>
    <input id="search" placeholder="search files..." />

    <h3>📁 Files</h3>
    <div id="files">Loading...</div>
  </div>

  <div class="panel">
    <h3>📄 Viewer</h3>
    <pre id="viewer">Select a file...</pre>
  </div>

</div>

<script>

const repo = "HMO-Tech/DT-Ai-outputs";

async function loadFiles() {
  const res = await fetch(`https://api.github.com/repos/${repo}/contents`);
  const data = await res.json();

  const filesDiv = document.getElementById("files");
  filesDiv.innerHTML = "";

  data.forEach(file => {
    const div = document.createElement("div");
    div.className = "file";
    div.innerText = file.name;

    div.onclick = () => loadFile(file.download_url);

    filesDiv.appendChild(div);
  });
}

async function loadFile(url) {
  const res = await fetch(url);
  const text = await res.text();
  document.getElementById("viewer").innerText = text;
}

document.getElementById("search").addEventListener("input", async (e) => {
  const q = e.target.value.toLowerCase();

  const res = await fetch(`https://api.github.com/repos/${repo}/contents`);
  const data = await res.json();

  const filtered = data.filter(f => f.name.toLowerCase().includes(q));

  const filesDiv = document.getElementById("files");
  filesDiv.innerHTML = "";

  filtered.forEach(file => {
    const div = document.createElement("div");
    div.className = "file";
    div.innerText = file.name;
    div.onclick = () => loadFile(file.download_url);
    filesDiv.appendChild(div);
  });
});

loadFiles();

</script>

</body>
</html>

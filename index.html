<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-T-Ai Outputs Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0f0f0f; color:#eee; margin:0; padding:0; }
    header { background:#1a1a1a; padding:20px; display:flex; align-items:center; }
    header img { height:50px; margin-right:20px; }
    header h1 { margin:0; font-size:1.5rem; }
    main { padding:20px; }
    h2 { margin-top:40px; }
    .repo-list { list-style:none; padding:0; }
    .repo-list li { background:#222; margin:5px 0; padding:10px; border-radius:5px; }
    input[type=text] { width:100%; padding:10px; margin-bottom:20px; border-radius:5px; border:none; font-size:1rem; }
    a { color:#00C7B7; text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>

<header>
  <img src="public/logo.png" alt="DT-Ai Logo">
  <h1>D-T-Ai Outputs Dashboard</h1>
</header>

<main>
  <h2>🔍 Search Files</h2>
  <input type="text" id="searchBox" placeholder="Search files...">

  <h2>📁 Repository Files</h2>
  <ul id="fileList" class="repo-list">
    <li>workflows/test.json</li>
    <li>reports/test_report.md</li>
    <li>logs/log.txt</li>
    <li>prompts/sample_prompt.json</li>
    <li>screenshots/placeholder.png</li>
    <li>README.md</li>
  </ul>

  <h2>📡 Live GitHub Repository</h2>
  <p>View the repo on <a href="https://github.com/HMO-Tech/DT-Ai-outputs" target="_blank">GitHub</a></p>
</main>

<script>
  const searchBox = document.getElementById('searchBox');
  const fileList = document.getElementById('fileList');
  const items = Array.from(fileList.getElementsByTagName('li'));

  searchBox.addEventListener('input', () => {
    const query = searchBox.value.toLowerCase();
    items.forEach(item => {
      item.style.display = item.textContent.toLowerCase().includes(query) ? '' : 'none';
    });
  });
</script>

</body>
</html>

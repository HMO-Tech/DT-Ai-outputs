<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Engineering Control Panel</title>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: #e5e7eb;
  padding: 30px;
}

h1 { margin-bottom: 5px; }

.subtitle {
  color: #94a3b8;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.panel {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  min-height: 200px;
}

.file {
  padding: 6px;
  border-bottom: 1px solid #1f2937;
  cursor: pointer;
}

.file:hover {
  background: #1f2937;
}

pre {
  white-space: pre-wrap;
  font-size: 12px;
  color: #93c5fd;
}

.search {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<h1>🧠 AI Engineering Control Panel</h1>
<div class="subtitle">Live GitHub-powered system dashboard</div>

<input class="search" id="search" placeholder="Search files...">

<div class="grid">

  <div class="panel">
    <h3>📁 Repository Files</h3>
    <div id="files"></div>
  </div>

  <div class="panel">
    <h3>👁 File Preview</h3>
    <pre id="preview">Select a file...</pre>
  </div>

</div>

<script>

const repo = "HMO-Tech/DT-Ai-outputs";

let allFiles = [];

async function loadRepo() {
  const folders = ["workflows", "reports", "logs", "prompts"];

  for (let folder of folders) {
    const url = `https://api.github.com/repos/${repo}/contents/${folder}`;

    try {
      const res = await fetch(url);
      const data = await res.json();

      data.forEach(file => {
        allFiles.push({
          name: file.name,
          path: file.path
        });

        const div = document.createElement("div");
        div.className = "file";
        div.innerText = "📄 " + file.path;

        div.onclick = () => loadFile(file.download_url);

        document.getElementById("files").appendChild(div);
      });

    } catch (e) {
      console.log("Error loading", folder);
    }
  }

  analyzeSystem();
}

async function loadFile(url) {
  const res = await fetch(url);
  const text = await res.text();
  document.getElementById("preview").innerText = text;
}

function analyzeSystem() {
  const insight = document.createElement("div");
  insight.style.marginTop = "20px";
  insight.style.color = "#34d399";

  insight.innerHTML = `
  🧠 System Insight:<br>
  - Total files loaded: ${allFiles.length}<br>
  - Status: ACTIVE<br>
  - AI workflow structure detected<br>
  - Repository integrity: OK
  `;

  document.body.appendChild(insight);
}

document.getElementById("search").addEventListener("input", function(e) {
  const value = e.target.value.toLowerCase();
  const items = document.querySelectorAll(".file");

  items.forEach(item => {
    item.style.display =
      item.innerText.toLowerCase().includes(value) ? "block" : "none";
  });
});

loadRepo();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D-T-AI Engineering Control Panel</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: #e5e7eb;
  margin: 0;
  padding: 30px;
}

.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.header img {
  height: 45px;
}

.subtitle {
  color: #94a3b8;
  margin-bottom: 20px;
}

.search {
  width: 100%;
  padding: 10px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: none;
  outline: none;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.panel {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  min-height: 300px;
  overflow: auto;
}

.file {
  padding: 8px;
  border-bottom: 1px solid #1f2937;
  cursor: pointer;
}

.file:hover {
  background: #1f2937;
}

pre {
  white-space: pre-wrap;
  font-size: 12px;
  color: #93c5fd;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="/logo.png" alt="logo">
  <h1>D-T-AI Outputs Control Panel</h1>
</div>

<div class="subtitle">
Live AI Engineering System • GitHub-powered dashboard
</div>

<!-- SEARCH -->
<input class="search" id="search" placeholder="Search files...">

<!-- MAIN GRID -->
<div class="grid">

  <!-- FILE LIST -->
  <div class="panel">
    <h3>📁 Repository Files</h3>
    <div id="files"></div>
  </div>

  <!-- PREVIEW -->
  <div class="panel">
    <h3>👁 File Preview</h3>
    <pre id="preview">Select a file to preview...</pre>
  </div>

</div>

<script>

const repo = "HMO-Tech/DT-Ai-outputs";

let allFiles = [];

async function loadRepo() {
  const folders = ["workflows", "reports", "logs", "prompts", "screenshots"];

  for (let folder of folders) {
    const url = `https://api.github.com/repos/${repo}/contents/${folder}`;

    try {
      const res = await fetch(url);
      const data = await res.json();

      data.forEach(file => {
        allFiles.push(file);

        const div = document.createElement("div");
        div.className = "file";
        div.innerText = "📄 " + file.path;

        div.onclick = () => loadFile(file.download_url);

        document.getElementById("files").appendChild(div);
      });

    } catch (e) {
      console.log("Error loading:", folder);
    }
  }

  showInsight();
}

// FILE PREVIEW
async function loadFile(url) {
  try {
    const res = await fetch(url);
    const text = await res.text();
    document.getElementById("preview").innerText = text;
  } catch {
    document.getElementById("preview").innerText = "Failed to load file";
  }
}

// SIMPLE INSIGHT ENGINE
function showInsight() {
  const insight = document.createElement("div");
  insight.style.marginTop = "20px";
  insight.style.color = "#34d399";

  insight.innerHTML = `
    🧠 System Insight<br>
    - Total files loaded: ${allFiles.length}<br>
    - Repository status: ACTIVE<br>
    - AI structure detected<br>
    - Control panel online
  `;

  document.body.appendChild(insight);
}

// SEARCH
document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();
  const items = document.querySelectorAll(".file");

  items.forEach(item => {
    item.style.display =
      item.innerText.toLowerCase().includes(value)
        ? "block"
        : "none";
  });
});

loadRepo();

</script>

</body>
</html>
